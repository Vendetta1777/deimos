<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Deimos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Rajdhani:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="grid"></div>
  <div class="hud-frame">
    <span class="corner tl"></span><span class="corner tr"></span>
    <span class="corner bl"></span><span class="corner br"></span>
  </div>

  <div class="wordmark">D E I M O S</div>

  <main class="center">
    <div class="stage" id="stage" title="Tap to speak · tap again to pause">
      <canvas id="orb"></canvas>
    </div>
    <div id="status" class="status">idle</div>
    <div class="captions" aria-live="polite">
      <div id="said" class="said"></div>
      <div id="reply" class="reply"></div>
    </div>
  </main>

  <div id="hint" class="hint">tap the orb &middot; or press space to speak &middot; tap again to pause</div>

  <script src="/app.js"></script>
</body>
</html>
