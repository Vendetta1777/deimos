<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Deimos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Orbitron:wght@400;500;700&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="grid"></div>
  <div class="emberfield"></div>
  <div class="vignette"></div>

  <div class="hud-frame">
    <span class="corner tl"></span><span class="corner tr"></span>
    <span class="corner bl"></span><span class="corner br"></span>
  </div>

  <div class="wordmark">DEIMOS</div>

  <main class="center">
    <div class="stage" id="stage" title="Tap to speak · tap again to pause">
      <div class="orb-halo"></div>
      <canvas id="orb"></canvas>
    </div>
    <div id="status" class="status">idle</div>
    <div id="progress" class="progress" aria-live="polite"></div>
    <div class="captions" aria-live="polite">
      <div id="said" class="said"></div>
      <div id="reply" class="reply"></div>
    </div>
  </main>

  <div id="hint" class="hint">tap the orb &middot; or press space to speak &middot; tap again to pause</div>

  <!-- HUD side rails: ambient readouts that frame the orb -->
  <aside class="rail rail-left">
    <div class="widget">
      <div class="w-label">Local Time</div>
      <div class="w-time" id="clock">--:--</div>
      <div class="w-sub" id="clock-date">—</div>
    </div>
  </aside>

  <aside class="rail rail-right">
    <div class="widget">
      <div class="w-label">Weather</div>
      <div class="w-temp" id="wx-temp">—</div>
      <div class="w-sub" id="wx-cond">loading…</div>
      <div class="w-sub w-loc" id="wx-loc"></div>
    </div>
    <div class="widget">
      <div class="w-label">Markets</div>
      <div class="w-stocks" id="stocks"><div class="w-sub">loading…</div></div>
    </div>
  </aside>

  <script src="/app.js"></script>
</body>
</html>
